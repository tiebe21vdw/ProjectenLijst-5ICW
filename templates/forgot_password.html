{% extends "layout.html" %}
{% block content %}
<h2>Wachtwoord Vergeten</h2>
<p>Vul je e-mailadres in. We sturen je een link waarmee je een nieuw wachtwoord kunt aanmaken.</p>

<form action="/forgot_password" method="post">
    <div class="input-group">
        <input type="email" name="email" placeholder="Je e-mailadres" required>
        {% if error %}
            <span class="error-message">{{ error }}</span>
        {% endif %}
    </div>
    <button type="submit">Herstellink verzenden</button>
</form>

<p><a href="{{ url_for('login') }}">Terug naar inloggen</a></p>
{% endblock %}
