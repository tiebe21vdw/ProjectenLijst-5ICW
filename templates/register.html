{% extends "layout.html" %}
{% block content %}
<h2>Registreren</h2>

<form action="/register" method="post">
    <div class="input-group">
        <input type="text" name="name" placeholder="Je volledige naam" required>
    </div>

    <div class="input-group">
        <input type="email" name="email" placeholder="Je e-mailadres" required>
        {% if error %}
            <span class="error-message">{{ error }}</span>
        {% endif %}
    </div>

    <div class="input-group">
        <input type="password" name="password" placeholder="Kies een wachtwoord" required>
    </div>

    <button type="submit">Registreer account</button>
</form>

<p>Heb je al een account? <a href="{{ url_for('login') }}">Log hier in</a>.</p>
{% endblock %}
